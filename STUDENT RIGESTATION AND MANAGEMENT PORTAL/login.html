<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Student Management System</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-left">
            <img src="image.png" alt="Student Portal" class="login-image">
        </div>

        <div class="login-right">
            <div class="login-form-wrapper">
                <h1 class="login-title">Student Login</h1>
                
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <p class="login-footer">Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Student Management Portal. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="login.js"></script>
</body>
</html>
