<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration and Management Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <header>
      <nav>

            <div class="logo">
               Student Management System
            </div>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav> 
    </header> 

    <div class="form-container" style="max-width: 800px; margin: 40px auto; padding: 30px; background: rgba(255,255,255,0.95); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);">
        <h2 style="text-align: center; margin-bottom: 25px; color: #008cf0;">Student Registration</h2>
        <form class="row g-3" id="registerForm">
          <div class="row" style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div class="col" style="flex: 1;">
              <label for="firstName" class="form-label">First Name</label>
              <input type="text" class="form-control" id="firstName" placeholder="First name" required>
            </div>
            <div class="col" style="flex: 1;">
              <label for="lastName" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
            </div>
          </div>

          <div class="col-md-6" style="margin-bottom: 15px;">
            <label for="inputEmail4" class="form-label">Email</label>
            <input type="email" class="form-control" id="inputEmail4" placeholder="student@example.com" required>
          </div>
          <div class="col-md-6" style="margin-bottom: 15px;">
            <label for="inputPassword4" class="form-label">Password</label>
            <input type="password" class="form-control" id="inputPassword4" placeholder="Create password" required>
          </div>
          <div class="col-12" style="margin-bottom: 15px;">
            <label for="inputAddress" class="form-label">Address</label>
            <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St" required>
          </div>
          <div class="col-12" style="margin-bottom: 15px;">
            <label for="inputAddress2" class="form-label">Address 2</label>
            <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
          </div>
          <div class="row" style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div class="col-md-6" style="flex: 2;">
              <label for="inputCity" class="form-label">City</label>
              <input type="text" class="form-control" id="inputCity" required>
            </div>
            <div class="col-md-4" style="flex: 2;">
              <label for="inputState" class="form-label">State</label>
              <select id="inputState" class="form-select" required>
                <option value="">Choose...</option>
                <option value="Tamil Nadu">Tamil Nadu</option>
                <option value="Kerala">Kerala</option>
                <option value="Karnataka">Karnataka</option>
                <option value="Andhra Pradesh">Andhra Pradesh</option>
                <option value="Maharashtra">Maharashtra</option>
                <option value="Delhi">Delhi</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="col-md-2" style="flex: 1;">
              <label for="inputZip" class="form-label">PIN Code</label>
              <input type="number" class="form-control" id="inputZip" placeholder="600001" required>
            </div>
          </div>
          <div class="col-12" style="margin-bottom: 20px;">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="gridCheck" required>
              <label class="form-check-label" for="gridCheck">
                I agree to the terms and conditions
              </label>
            </div>
          </div>
          <div class="col-12" style="text-align: center;">
            <button type="submit" class="btn btn-primary" style="background: #008cf0; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 6px; cursor: pointer;">Register Now</button>
          </div>
        </form>
    </div>

<script src="script.js"></script>
<script src="register.js"></script>
</body>
</html>
